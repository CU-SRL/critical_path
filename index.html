<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Critical Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #000000;
      --border:      #1e1e1e;
      --text:        #ffffff;
      --muted:       #4a4a4a;
      --dim:         #252525;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      padding: 2.5rem 2.5rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1;
    }

    .subtitle {
      margin-left: 1.25rem;
      padding-bottom: 0.1rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Scrollable content ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 2.5rem 2.5rem;
    }

    /* ── Table ── */
    .tbl {
      width: 100%;
      border-collapse: collapse;
    }

    .tbl thead th {
      padding: 0 0 0.65rem;
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .tbl thead th + th { padding-left: 2rem; }
    .tbl thead th:last-child { width: 2rem; }

    .tbl tbody tr {
      border-bottom: 1px solid var(--border);
      animation: rowIn 0.15s ease;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tbl tbody tr:hover .del-btn { opacity: 1; }

    .tbl td { padding: 0; vertical-align: middle; }
    .tbl td + td { padding-left: 2rem; }
    .tbl td:last-child { width: 2rem; text-align: right; }

    .cell-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      padding: 0.8rem 0;
      caret-color: var(--text);
    }

    .cell-input::placeholder { color: var(--dim); }

    .cell-input[type="number"] {
      -moz-appearance: textfield;
      width: 120px;
    }
    .cell-input[type="number"]::-webkit-outer-spin-button,
    .cell-input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* ── Delete button ── */
    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1;
      padding: 0 0.2rem;
      opacity: 0;
      transition: color 0.1s, opacity 0.15s;
    }
    .del-btn:hover { color: var(--text); }

    /* ── Add row button ── */
    .add-btn {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-top: 1.1rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0;
      transition: color 0.15s;
    }
    .add-btn:hover { color: var(--text); }
    .add-btn .plus { font-size: 1.1rem; font-weight: 300; line-height: 1; }

    /* ── Footer ── */
    footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 34px;
      border-top: 1px solid var(--border);
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-left { display: flex; gap: 2rem; align-items: center; }

    .status-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text);
      margin-right: 0.45rem;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Critical Path</h1>
    <span class="subtitle">Engineering Project Management</span>
  </header>

  <main>
    <table class="tbl">
      <thead>
        <tr>
          <th>Item Name</th>
          <th>Duration (days)</th>
          <th>Std Dev (days)</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <button class="add-btn" id="add-btn">
      <span class="plus">+</span>
      <span>Add Item</span>
    </button>
  </main>

  <footer>
    <div class="footer-left">
      <span><span class="status-dot"></span>System Ready</span>
      <span>CPM v0.1.0</span>
      <span>Mode: Analysis</span>
    </div>
    <span id="clock"></span>
  </footer>

  <script>
    const tbody = document.getElementById('tbody');

    function addRow() {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input class="cell-input" type="text"   placeholder="Item name" /></td>
        <td><input class="cell-input" type="number" placeholder="0" min="0" step="0.5" /></td>
        <td><input class="cell-input" type="number" placeholder="0" min="0" step="0.1" /></td>
        <td><button class="del-btn" title="Remove">×</button></td>
      `;
      tr.querySelector('.del-btn').addEventListener('click', () => tr.remove());
      tbody.appendChild(tr);
      tr.querySelector('.cell-input').focus();
    }

    document.getElementById('add-btn').addEventListener('click', addRow);

    // Tab out of last cell in last row → new row
    tbody.addEventListener('keydown', e => {
      if (e.key !== 'Tab' || e.shiftKey) return;
      const inputs = [...tbody.querySelectorAll('.cell-input')];
      if (e.target === inputs[inputs.length - 1]) {
        e.preventDefault();
        addRow();
      }
    });

    const clock = document.getElementById('clock');
    (function tick() {
      clock.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
      setTimeout(tick, 1000);
    })();
  </script>

</body>
</html>
