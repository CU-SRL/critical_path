<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Critical Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deep:    #080c14;
      --bg-surface: #0d1220;
      --bg-panel:   #111827;
      --accent:     #00d4ff;
      --accent-dim: #0099bb;
      --accent-glow:#00d4ff44;
      --grid-line:  #1a2540;
      --text-primary:   #e2e8f0;
      --text-secondary: #64748b;
      --danger:     #ff4f4f;
    }

    html, body {
      height: 100%;
      background-color: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* Engineering grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial vignette over grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, transparent 30%, var(--bg-deep) 80%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header bar ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 48px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--grid-line);
    }

    .header-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Main layout ── */
    main {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 48px);
      gap: 1.5rem;
    }

    /* ── Corner brackets ── */
    .bracket-frame {
      position: relative;
      padding: 3rem 4rem;
    }

    .bracket-frame::before,
    .bracket-frame::after,
    .bracket-frame > .corner-br,
    .bracket-frame > .corner-bl {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--accent);
      border-style: solid;
    }

    .bracket-frame::before {
      top: 0; left: 0;
      border-width: 2px 0 0 2px;
    }
    .bracket-frame::after {
      top: 0; right: 0;
      border-width: 2px 2px 0 0;
    }
    .bracket-frame > .corner-br {
      bottom: 0; right: 0;
      border-width: 0 2px 2px 0;
    }
    .bracket-frame > .corner-bl {
      bottom: 0; left: 0;
      border-width: 0 0 2px 2px;
    }

    /* ── Title ── */
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-primary);
      text-shadow:
        0 0 20px var(--accent-glow),
        0 0 60px var(--accent-glow);
      line-height: 1;
      white-space: nowrap;
    }

    h1 span.accent {
      color: var(--accent);
      text-shadow:
        0 0 10px var(--accent),
        0 0 30px var(--accent-glow);
    }

    /* ── Subtitle / tagline ── */
    .tagline {
      font-size: 0.7rem;
      color: var(--text-secondary);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── Scan line animation ── */
    @keyframes scanline {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    .scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .scanline::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 3px;
      background: linear-gradient(to bottom, transparent, var(--accent-glow), transparent);
      animation: scanline 6s linear infinite;
    }

    /* ── Bottom status bar ── */
    footer {
      position: fixed;
      bottom: 0;
      inset-inline: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 32px;
      background: var(--bg-panel);
      border-top: 1px solid var(--grid-line);
      font-size: 0.6rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
    }

    .footer-coords {
      display: flex;
      gap: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="scanline"></div>

  <header>
    <span class="header-label">CPM // Project Analysis Tool</span>
    <div class="header-status">
      <div class="status-dot"></div>
      <span>SYSTEM READY</span>
    </div>
  </header>

  <main>
    <div class="bracket-frame">
      <span class="corner-br"></span>
      <span class="corner-bl"></span>
      <h1>Critical<span class="accent">&nbsp;Path</span></h1>
    </div>
    <p class="tagline">Engineering Project Management &mdash; Critical Path Method</p>
  </main>

  <footer>
    <div class="footer-coords">
      <span>CPM v0.1.0</span>
      <span>MODE: ANALYSIS</span>
    </div>
    <span id="clock"></span>
  </footer>

  <script>
    const clock = document.getElementById('clock');
    function tick() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString('en-US', { hour12: false });
    }
    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
