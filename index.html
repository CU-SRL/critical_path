<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Critical Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:           #000000;
      --border:       #222222;
      --text-primary: #ffffff;
      --text-muted:   #555555;
      --text-dim:     #333333;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── Top bar ── */
    header {
      position: fixed;
      top: 0;
      inset-inline: 0;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      padding: 2.5rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-primary);
      line-height: 1;
    }

    .subtitle {
      margin-left: 1.25rem;
      margin-bottom: 0.1rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      align-self: flex-end;
    }

    /* ── Bottom status bar ── */
    footer {
      position: fixed;
      bottom: 0;
      inset-inline: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 36px;
      border-top: 1px solid var(--border);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .footer-left {
      display: flex;
      gap: 2rem;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.live {
      background: #ffffff;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Critical Path</h1>
    <span class="subtitle">Engineering Project Management</span>
  </header>

  <footer>
    <div class="footer-left">
      <span class="status-item">
        <span class="status-dot live"></span>
        <span>System Ready</span>
      </span>
      <span>CPM v0.1.0</span>
      <span>Mode: Analysis</span>
    </div>
    <span id="clock"></span>
  </footer>

  <script>
    const clock = document.getElementById('clock');
    function tick() {
      clock.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
    }
    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
