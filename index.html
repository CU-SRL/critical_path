<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Critical Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #000;
      --border: #1e1e1e;
      --text:   #fff;
      --muted:  #4a4a4a;
      --dim:    #242424;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      padding: 2.5rem 2.5rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1;
    }

    .subtitle {
      margin-left: 1.25rem;
      padding-bottom: 0.1rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Tab bar ── */
    .tab-bar {
      flex-shrink: 0;
      display: flex;
      padding: 0 2.5rem;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      margin-bottom: -1px;
      padding: 0.7rem 1rem 0.65rem;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s;
    }
    .tab-btn:hover:not(.active) { color: #888; }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    /* ── Tab panels ── */
    main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .tab-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .tab-panel.active { display: flex; }

    /* ── ITEMS TAB ── */
    .items-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 2.5rem 1rem;
    }

    .tbl {
      width: 100%;
      max-width: 860px;
      border-collapse: collapse;
    }

    .tbl col.col-num  { width: 110px; }
    .tbl col.col-pred { width: 200px; }
    .tbl col.col-del  { width: 1.75rem; }

    .tbl thead th {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 1.25rem 0 0.6rem;
      font-size: 0.55rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
      z-index: 1;
    }

    .tbl th + th, .tbl td + td { padding-left: 1.25rem; }
    .tbl tbody tr { border-bottom: 1px solid var(--border); }
    .tbl tbody tr:hover .del-btn { opacity: 1; }
    .tbl td { padding: 0; vertical-align: middle; }

    .cell-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.82rem;
      letter-spacing: 0.03em;
      padding: 0.72rem 0;
      caret-color: var(--text);
    }
    .cell-input::placeholder { color: var(--dim); }
    .cell-input[type="number"] { -moz-appearance: textfield; }
    .cell-input[type="number"]::-webkit-outer-spin-button,
    .cell-input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .pred-cell {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.3rem;
      padding: 0.4rem 0 0.4rem 1.25rem;
      min-height: 40px;
    }

    .pred-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.15rem 0.3rem 0.15rem 0.45rem;
      border: 1px solid #2a2a2a;
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      color: #999;
      white-space: nowrap;
    }

    .chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: #444;
      font-size: 0.75rem;
      padding: 0 0.1rem;
      line-height: 1;
      transition: color 0.12s;
    }
    .chip-remove:hover { color: var(--text); }

    .add-pred-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      padding: 0 0.1rem;
      line-height: 1;
      transition: color 0.12s;
    }
    .add-pred-btn:hover { color: var(--text); }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      padding: 0;
      opacity: 0;
      transition: color 0.12s, opacity 0.15s;
    }
    .del-btn:hover { color: var(--text); }

    .add-item-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin: 1rem 2.5rem 1.5rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0;
      transition: color 0.15s;
    }
    .add-item-btn:hover { color: var(--text); }
    .add-item-btn .plus { font-size: 1.05rem; line-height: 1; }

    @keyframes rowIn { from { opacity: 0; } to { opacity: 1; } }
    .tbl tbody tr { animation: rowIn 0.12s ease; }

    /* ── GRAPH TAB ── */
    .graph-viewport {
      flex: 1;
      overflow: auto;
      position: relative;
      padding: 2.5rem;
    }

    .placeholder-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      pointer-events: none;
    }

    #graph-svg { display: block; }

    .g-node-rect { fill: #000; stroke: #2e2e2e; stroke-width: 1; }
    .g-node-name { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 11px; fill: #ddd; }
    .g-node-meta { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 10px; fill: #484848; }
    .g-edge      { fill: none; stroke: #282828; stroke-width: 1.5; }

    /* ── CALENDAR TAB ── */
    .cal-viewport {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    #cal-svg { display: block; }

    .c-weekend  { fill: #060606; }
    .c-grid-v   { stroke: #141414; stroke-width: 1; }
    .c-grid-vwk { stroke: #222; stroke-width: 1; }
    .c-grid-h   { stroke: #141414; stroke-width: 1; }
    .c-today    { stroke: #333; stroke-width: 1; stroke-dasharray: 3 3; }
    .c-month    { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 8px;  fill: #383838; letter-spacing: 0.14em; text-transform: uppercase; }
    .c-day      { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 10px; fill: #505050; }
    .c-dow      { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 7px;  fill: #2d2d2d; letter-spacing: 0.08em; }
    .c-name     { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 11px; fill: #bbb; }
    .c-bar-crit { fill: rgba(255,255,255,0.88); }
    .c-bar-norm { fill: rgba(255,255,255,0.28); }
    .c-float    { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 1; stroke-dasharray: 3 3; }

    /* ── Picker ── */
    #picker-backdrop {
      position: fixed;
      inset: 0;
      z-index: 99;
    }
    #picker {
      position: fixed;
      z-index: 100;
      background: #060606;
      border: 1px solid #2a2a2a;
      min-width: 190px;
      max-height: 230px;
      overflow-y: auto;
      padding: 0.2rem 0;
    }

    .picker-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.8rem;
      font-size: 0.73rem;
      font-weight: 300;
      color: #777;
      cursor: pointer;
      letter-spacing: 0.03em;
      user-select: none;
    }
    .picker-row:hover { color: var(--text); background: #111; }
    .picker-row.selected { color: var(--text); }
    .picker-row.cyclic { color: #2e2e2e; cursor: default; }
    .picker-row.cyclic:hover { color: #2e2e2e; background: transparent; }
    .picker-check { width: 0.8rem; font-size: 0.6rem; flex-shrink: 0; }
    .picker-empty { padding: 0.5rem 0.8rem; font-size: 0.68rem; color: #333; letter-spacing: 0.06em; }

    /* ── Footer ── */
    footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 34px;
      border-top: 1px solid var(--border);
      font-size: 0.56rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .footer-left { display: flex; gap: 2rem; }
  </style>
</head>
<body>

  <header>
    <h1>Critical Path</h1>
    <span class="subtitle">Engineering Project Management</span>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="items">Items</button>
    <button class="tab-btn"        data-tab="graph">Graph</button>
    <button class="tab-btn"        data-tab="calendar">Calendar</button>
  </nav>

  <main>

    <!-- ── Items tab ── -->
    <div id="tab-items" class="tab-panel active">
      <div class="items-scroll">
        <table class="tbl">
          <colgroup>
            <col /><col class="col-num" /><col class="col-num" /><col class="col-pred" /><col class="col-del" />
          </colgroup>
          <thead>
            <tr>
              <th>Item Name</th>
              <th>Duration (days)</th>
              <th>Std Dev (days)</th>
              <th>Predecessors</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <button class="add-item-btn" id="add-btn">
        <span class="plus">+</span><span>Add Item</span>
      </button>
    </div>

    <!-- ── Graph tab ── -->
    <div id="tab-graph" class="tab-panel">
      <div class="graph-viewport">
        <div class="placeholder-msg" id="graph-empty">Add items to visualize dependencies</div>
        <svg id="graph-svg"></svg>
      </div>
    </div>

    <!-- ── Calendar tab ── -->
    <div id="tab-calendar" class="tab-panel">
      <div class="cal-viewport">
        <div class="placeholder-msg" id="cal-empty">Add items with durations to see the calendar</div>
        <svg id="cal-svg"></svg>
      </div>
    </div>

  </main>

  <footer>
    <div class="footer-left">
      <span>CPM v0.1.0</span>
      <span>Mode: Analysis</span>
    </div>
    <span id="clock"></span>
  </footer>

  <div id="picker-backdrop" hidden></div>
  <div id="picker" hidden></div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    const items = new Map(); // id → { id, name, duration, stddev, predecessors: Set<id> }
    let nextId      = 1;
    let activePicker = null;

    // ── Utilities ──────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function trunc(s, n) { return s.length > n ? s.slice(0, n - 1) + '…' : s; }
    function label(id)   { const it = items.get(id); return it?.name.trim() || `#${id}`; }
    function dur(id)     { return Math.max(parseFloat(items.get(id)?.duration) || 0, 0); }

    // ── CPM schedule ──────────────────────────────────────────────────────────
    function computeSchedule() {
      const es = new Map(), ef = new Map(), ls = new Map(), lf = new Map();
      for (const [id] of items) { es.set(id, 0); ef.set(id, 0); }

      // Forward pass
      for (let i = 0; i < items.size; i++) {
        for (const [id, item] of items) {
          let maxPredEF = 0;
          for (const pid of item.predecessors)
            if (items.has(pid)) maxPredEF = Math.max(maxPredEF, ef.get(pid) || 0);
          es.set(id, maxPredEF);
          ef.set(id, maxPredEF + dur(id));
        }
      }

      const projectFinish = items.size ? Math.max(...ef.values()) : 0;

      // Build successor map
      const succ = new Map([...items.keys()].map(id => [id, new Set()]));
      for (const [id, item] of items)
        for (const pid of item.predecessors) succ.get(pid)?.add(id);

      // Backward pass
      for (const [id] of items) { lf.set(id, projectFinish); ls.set(id, projectFinish - dur(id)); }
      for (let i = 0; i < items.size; i++) {
        for (const [id] of items) {
          const succs = succ.get(id);
          let minSuccLS = projectFinish;
          for (const sid of succs) minSuccLS = Math.min(minSuccLS, ls.get(sid) ?? projectFinish);
          lf.set(id, minSuccLS);
          ls.set(id, minSuccLS - dur(id));
        }
      }

      // Critical: float ≈ 0
      const critical = new Set();
      for (const [id] of items)
        if (Math.abs((ls.get(id) ?? 0) - (es.get(id) ?? 0)) < 0.001) critical.add(id);

      return { es, ef, ls, lf, critical, projectFinish };
    }

    // ── Cycle detection ────────────────────────────────────────────────────────
    function wouldCycle(itemId, predId) {
      const visited = new Set();
      function dfs(id) {
        if (id === predId) return true;
        if (visited.has(id)) return false;
        visited.add(id);
        for (const [oid, o] of items) if (o.predecessors.has(id) && dfs(oid)) return true;
        return false;
      }
      return dfs(itemId);
    }

    // ── Item CRUD ─────────────────────────────────────────────────────────────
    function addItem() {
      const id = nextId++;
      items.set(id, { id, name: '', duration: '', stddev: '', predecessors: new Set() });
      renderTable(); refresh();
      document.querySelector(`[data-id="${id}"][data-field="name"]`)?.focus();
    }

    function removeItem(id) {
      items.delete(id);
      for (const item of items.values()) item.predecessors.delete(id);
      closePicker(); renderTable(); refresh();
    }

    function updateField(id, field, value) {
      const item = items.get(id);
      if (!item) return;
      item[field] = value;
      if (field === 'name')
        for (const [oid, o] of items) if (o.predecessors.has(id)) refreshChips(oid);
      refresh();
    }

    function togglePred(itemId, predId) {
      const item = items.get(itemId);
      if (!item) return;
      if (item.predecessors.has(predId)) item.predecessors.delete(predId);
      else { if (wouldCycle(itemId, predId)) return; item.predecessors.add(predId); }
      refreshChips(itemId); refresh();
    }

    // ── Table rendering ────────────────────────────────────────────────────────
    function renderTable() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      for (const [id, item] of items) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input class="cell-input" type="text"   value="${esc(item.name)}"     placeholder="Item name" data-field="name"     data-id="${id}"/></td>
          <td><input class="cell-input" type="number" value="${esc(item.duration)}" placeholder="0" min="0" step="0.5" data-field="duration" data-id="${id}"/></td>
          <td><input class="cell-input" type="number" value="${esc(item.stddev)}"   placeholder="0" min="0" step="0.1" data-field="stddev"   data-id="${id}"/></td>
          <td><div class="pred-cell" data-pred-for="${id}">${chips(id)}</div></td>
          <td><button class="del-btn" data-del="${id}">&#xD7;</button></td>`;
        tbody.appendChild(tr);
      }
    }

    function chips(id) {
      const item = items.get(id);
      if (!item) return '';
      let h = '';
      for (const pid of item.predecessors)
        if (items.has(pid))
          h += `<span class="pred-chip">${esc(trunc(label(pid), 14))}<button class="chip-remove" data-remove-pred="${id}" data-pred-id="${pid}">&#xD7;</button></span>`;
      return h + `<button class="add-pred-btn" data-add-pred="${id}">+</button>`;
    }

    function refreshChips(id) {
      const el = document.querySelector(`[data-pred-for="${id}"]`);
      if (el) el.innerHTML = chips(id);
    }

    // Event delegation
    document.getElementById('tbody').addEventListener('input', e => {
      if (e.target.dataset.field) updateField(+e.target.dataset.id, e.target.dataset.field, e.target.value);
    });
    document.getElementById('tbody').addEventListener('click', e => {
      const del     = e.target.closest('[data-del]');
      const addPred = e.target.closest('[data-add-pred]');
      const rmPred  = e.target.closest('[data-remove-pred]');
      if (del)     { removeItem(+del.dataset.del); return; }
      if (addPred) { showPicker(+addPred.dataset.addPred, addPred); return; }
      if (rmPred)  { togglePred(+rmPred.dataset.removePred, +rmPred.dataset.predId); return; }
    });
    document.getElementById('add-btn').addEventListener('click', addItem);

    // ── Picker ────────────────────────────────────────────────────────────────
    const picker         = document.getElementById('picker');
    const pickerBackdrop = document.getElementById('picker-backdrop');

    function showPicker(itemId, anchor) {
      activePicker = itemId;
      const item = items.get(itemId);
      picker.innerHTML = '';
      const others = [...items.entries()].filter(([id]) => id !== itemId);
      if (!others.length) {
        picker.innerHTML = '<div class="picker-empty">No other items yet</div>';
      } else {
        for (const [id] of others) {
          const sel    = item.predecessors.has(id);
          const cyclic = !sel && wouldCycle(itemId, id);
          const row    = document.createElement('div');
          row.className = `picker-row${sel ? ' selected' : ''}${cyclic ? ' cyclic' : ''}`;
          row.dataset.pickId = id;
          row.innerHTML = `<span class="picker-check">${sel ? '✓' : ''}</span>${esc(trunc(label(id), 24))}${cyclic ? ' <span style="color:#2a2a2a;font-size:.6rem">⊗</span>' : ''}`;
          picker.appendChild(row);
        }
      }
      const r = anchor.getBoundingClientRect();
      picker.style.left = `${Math.min(r.left, window.innerWidth - 210)}px`;
      picker.style.top  = `${r.bottom + 4}px`;
      picker.hidden = pickerBackdrop.hidden = false;
    }

    function closePicker() {
      picker.hidden = pickerBackdrop.hidden = true;
      activePicker = null;
    }

    pickerBackdrop.addEventListener('click', closePicker);
    picker.addEventListener('click', e => {
      const row = e.target.closest('[data-pick-id]');
      if (!row || activePicker === null || row.classList.contains('cyclic')) return;
      togglePred(activePicker, +row.dataset.pickId);
      const item = items.get(activePicker);
      picker.querySelectorAll('.picker-row[data-pick-id]').forEach(r => {
        const id = +r.dataset.pickId, sel = item?.predecessors.has(id);
        r.classList.toggle('selected', !!sel);
        r.querySelector('.picker-check').textContent = sel ? '✓' : '';
      });
    });

    // ── Graph rendering ────────────────────────────────────────────────────────
    const NW = 148, NH = 50, CG = 96, RG = 22, GPAD = 36;

    function renderGraph() {
      const svg   = document.getElementById('graph-svg');
      const empty = document.getElementById('graph-empty');
      if (items.size === 0) {
        svg.innerHTML = ''; svg.removeAttribute('width'); svg.removeAttribute('height');
        empty.style.display = ''; return;
      }
      empty.style.display = 'none';

      // Layout
      const col = new Map();
      for (const [id] of items) col.set(id, 0);
      for (let i = 0; i < items.size; i++)
        for (const [id, item] of items)
          for (const pid of item.predecessors)
            if (items.has(pid)) { const d = (col.get(pid) ?? 0) + 1; if (d > (col.get(id) ?? 0)) col.set(id, d); }

      const groups = new Map();
      for (const [id, c] of col) { if (!groups.has(c)) groups.set(c, []); groups.get(c).push(id); }
      const layout = new Map();
      for (const [c, ids] of groups) ids.forEach((id, r) => layout.set(id, { c, r }));

      const numCols  = Math.max(...groups.keys()) + 1;
      const colSizes = new Map([...groups.entries()].map(([c, ids]) => [c, ids.length]));
      const maxRows  = Math.max(...colSizes.values());
      const contentH = maxRows * NH + Math.max(0, maxRows - 1) * RG;
      const totalW   = GPAD + numCols * NW + Math.max(0, numCols - 1) * CG + GPAD;
      const totalH   = GPAD + contentH + GPAD;

      const pos = new Map();
      for (const [id, { c, r }] of layout) {
        const cnt = colSizes.get(c), colH = cnt * NH + Math.max(0, cnt - 1) * RG;
        pos.set(id, { x: GPAD + c * (NW + CG), y: GPAD + (contentH - colH) / 2 + r * (NH + RG) });
      }

      let s = `<defs><marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M 0 1.2 L 6 3.5 L 0 5.8 z" fill="#303030"/></marker></defs>`;

      for (const [id, item] of items) {
        const to = pos.get(id);
        for (const pid of item.predecessors) {
          const fr = pos.get(pid);
          if (!fr || !to) continue;
          const x1 = fr.x + NW, y1 = fr.y + NH / 2, x2 = to.x, y2 = to.y + NH / 2, mx = (x1 + x2) / 2;
          s += `<path class="g-edge" d="M${x1} ${y1} C${mx} ${y1},${mx} ${y2},${x2} ${y2}" marker-end="url(#arr)"/>`;
        }
      }
      for (const [id, item] of items) {
        const { x, y } = pos.get(id);
        const name = esc(trunc(item.name.trim() || `#${id}`, 20));
        const meta = item.duration ? esc(`${item.duration} days`) : '';
        s += `<g><rect class="g-node-rect" x="${x}" y="${y}" width="${NW}" height="${NH}" rx="1"/>
          <text class="g-node-name" x="${x + NW/2}" y="${y + (meta ? 20 : 27)}" text-anchor="middle">${name}</text>
          ${meta ? `<text class="g-node-meta" x="${x + NW/2}" y="${y + 36}" text-anchor="middle">${meta}</text>` : ''}</g>`;
      }

      svg.setAttribute('width', totalW); svg.setAttribute('height', totalH);
      svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
      svg.innerHTML = s;
    }

    // ── Calendar rendering ─────────────────────────────────────────────────────
    const NAME_W = 170, DAY_W = 38, ROW_H = 40, HDR_H = 48, CAL_PAD = 24;

    function renderCalendar() {
      const svg   = document.getElementById('cal-svg');
      const empty = document.getElementById('cal-empty');

      const hasDuration = [...items.values()].some(it => parseFloat(it.duration) > 0);
      if (items.size === 0 || !hasDuration) {
        svg.innerHTML = ''; svg.removeAttribute('width'); svg.removeAttribute('height');
        empty.style.display = ''; return;
      }
      empty.style.display = 'none';

      const { es, ef, lf, critical } = computeSchedule();

      const today = new Date(); today.setHours(0, 0, 0, 0);
      const maxEF     = Math.max(...ef.values(), 14);
      const totalDays = Math.ceil(maxEF) + 7;

      const svgW = NAME_W + totalDays * DAY_W + CAL_PAD;
      const svgH = HDR_H + items.size * ROW_H + CAL_PAD;

      let s = '';

      // Weekend shading
      for (let d = 0; d < totalDays; d++) {
        const dt = new Date(today); dt.setDate(today.getDate() + d);
        if (dt.getDay() === 0 || dt.getDay() === 6)
          s += `<rect class="c-weekend" x="${NAME_W + d * DAY_W}" y="${HDR_H}" width="${DAY_W}" height="${items.size * ROW_H}"/>`;
      }

      // Horizontal row lines
      for (let r = 0; r <= items.size; r++)
        s += `<line class="c-grid-h" x1="${NAME_W}" y1="${HDR_H + r * ROW_H}" x2="${svgW - CAL_PAD}" y2="${HDR_H + r * ROW_H}"/>`;

      // Vertical day lines + date labels
      let lastMonth = -1;
      for (let d = 0; d <= totalDays; d++) {
        const x  = NAME_W + d * DAY_W;
        const dt = new Date(today); dt.setDate(today.getDate() + d);
        const isWeekStart = dt.getDay() === 1;
        s += `<line class="${isWeekStart ? 'c-grid-vwk' : 'c-grid-v'}" x1="${x}" y1="${HDR_H}" x2="${x}" y2="${svgH - CAL_PAD}"/>`;

        if (d < totalDays) {
          const cx  = x + DAY_W / 2;
          const mon = dt.getMonth();
          if (mon !== lastMonth) {
            s += `<text class="c-month" x="${x + 3}" y="12">${dt.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }).toUpperCase()}</text>`;
            lastMonth = mon;
          }
          s += `<text class="c-day" x="${cx}" y="30" text-anchor="middle">${dt.getDate()}</text>`;
          s += `<text class="c-dow" x="${cx}" y="42" text-anchor="middle">${['S','M','T','W','T','F','S'][dt.getDay()]}</text>`;
        }
      }

      // Today marker
      s += `<line class="c-today" x1="${NAME_W}" y1="8" x2="${NAME_W}" y2="${svgH - CAL_PAD}"/>`;

      // Item rows
      let row = 0;
      for (const [id, item] of items) {
        const d  = dur(id);
        if (!d) { row++; continue; }
        const y  = HDR_H + row * ROW_H;
        const bY = y + ROW_H * 0.28;
        const bH = ROW_H * 0.44;

        // Name
        s += `<text class="c-name" x="${NAME_W - 10}" y="${y + ROW_H / 2 + 4}" text-anchor="end">${esc(trunc(label(id), 20))}</text>`;

        // Float bar (slack — how far item could slip)
        const floatDays = (lf.get(id) || 0) - (ef.get(id) || 0);
        if (floatDays > 0.01) {
          const fx = NAME_W + (ef.get(id) || 0) * DAY_W;
          const fw = floatDays * DAY_W;
          s += `<rect class="c-float" x="${fx}" y="${bY}" width="${fw}" height="${bH}" rx="1"/>`;
        }

        // Duration bar
        const bX = NAME_W + (es.get(id) || 0) * DAY_W;
        const bW = Math.max(d * DAY_W, 3);
        s += `<rect class="${critical.has(id) ? 'c-bar-crit' : 'c-bar-norm'}" x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="1"/>`;

        row++;
      }

      // Names for zero-duration items (still list them)
      row = 0;
      for (const [id, item] of items) {
        if (!dur(id)) {
          const y = HDR_H + row * ROW_H;
          s += `<text class="c-name" x="${NAME_W - 10}" y="${y + ROW_H / 2 + 4}" text-anchor="end" style="fill:#333">${esc(trunc(label(id), 20))}</text>`;
        }
        row++;
      }

      svg.setAttribute('width', svgW); svg.setAttribute('height', svgH);
      svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
      svg.innerHTML = s;
    }

    // ── Refresh both visualizations ───────────────────────────────────────────
    function refresh() { renderGraph(); renderCalendar(); }

    // ── Tabs ──────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    // ── Clock ─────────────────────────────────────────────────────────────────
    const clockEl = document.getElementById('clock');
    (function tick() {
      clockEl.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
      setTimeout(tick, 1000);
    })();
  </script>

</body>
</html>
